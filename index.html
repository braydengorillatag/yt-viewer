<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblocked Search Hub</title>
    <style>
        body { margin: 0; padding: 20px; background-color: #0c0c0e; color: #fff; font-family: system-ui, sans-serif; text-align: center; }
        .box { max-width: 500px; margin: 60px auto; background: #141416; padding: 30px; border-radius: 16px; border: 1px solid #27272a; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        h2 { color: #ff0000; margin-top: 0; font-size: 24px; }
        p { color: #a1a1aa; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .button-list { display: flex; flex-direction: column; gap: 14px; }
        .yt-btn { display: block; background: #ff0000; border: 1px solid #ff3333; color: #fff; padding: 16px; border-radius: 8px; font-weight: bold; text-decoration: none; font-size: 15px; text-transform: uppercase; }
        .yt-btn:hover { background: #cc0000; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="box">
    <h2>YouTube Search & Browse Hub</h2>
    <p>Click the button below to open an unblocked YouTube copy. Once it opens, type <b>jynxzi</b> directly into its search bar to watch his live video feed.</p>
    
    <div class="button-list">
        <a class="yt-btn" href="https://nadeko.net" target="_blank">Launch Search Engine</a>
    </div>
</div>

</body>
</html>
